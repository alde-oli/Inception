version: '3'

services:
  mariadb:
    build:
      context: .
      dockerfile: requirements/mariadb/Dockerfile
      args:  # Utilisez les variables `SQL_` comme arguments de build si nécessaire dans votre Dockerfile
        DB_NAME: ${SQL_DATABASE}
        DB_USER: ${SQL_USER}
        DB_PASS: ${SQL_PASSWORD}
        DB_ROOT: ${SQL_ROOT_PASSWORD}
    container_name: mariadb
    ports:
      - "3306:3306"
    networks:
      - inception
    volumes:
      - db-volume:/var/lib/mysql
    restart: always
    environment:  # Passez les mêmes variables `SQL_` comme variables d'environnement au conteneur
      - DB_NAME=${SQL_DATABASE}
      - DB_USER=${SQL_USER}
      - DB_PASS=${SQL_PASSWORD}
      - DB_ROOT=${SQL_ROOT_PASSWORD}

  nginx:
    container_name: nginx
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - wordpress
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "443:443"
    restart: on-failure

  wordpress:
    container_name: wordpress
    env_file: .env
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    depends_on:
      - mariadb
    restart: on-failure
    expose:
      - "9000"

volumes:
  wordpress:
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/alde-oli/data/wordpress'
  db-volume:
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/alde-oli/data/mariadb'

networks:
  inception:
    driver: bridge
